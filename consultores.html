<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandCode Solutions - Consultores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0052cc 0%, #0078ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0, 120, 255, 0.6);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent);
            z-index: 1;
        }

        .logo img {
            width: 150%;
            height: 150%;
            object-fit: contain;
            position: relative;
            z-index: 2;
        }

        .welcome-section {
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .welcome-section h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .welcome-section p {
            color: #b0b0b0;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 50px 0;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.3rem;
            border: none;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
            stroke: url(#socialGradient);
        }

        .social-link:hover svg {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .consultores-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .consultor-link {
            display: inline-block;
            text-decoration: none;
        }

        .consultor-box-image {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 15px;
            transition: transform 0.5s ease;
            cursor: pointer;
            animation: fadeInUp 0.8s ease-out 0.6s both;
            display: block;
        }

        .consultor-box-image:hover {
            transform: scale(1.02);
        }

        .consultor-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px;
            background: linear-gradient(135deg, #000000 0%, #001a4d 100%);
            border: 1.5px solid rgba(0, 120, 255, 0.4);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .consultor-card:hover {
            background: linear-gradient(135deg, #0a0a1a 0%, #002266 100%);
            border-color: rgba(0, 120, 255, 0.7);
            transform: translateX(5px);
        }

        .consultor-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, #003d99 0%, #0078ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 120, 255, 0.2);
        }

        .consultor-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .consultor-text {
            flex: 1;
            text-align: left;
        }

        .consultor-text p {
            color: #cbd5e1;
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.6;
            margin: 0;
            white-space: normal;
            word-wrap: break-word;
        }

        .footer {
            background: #000000;
            border-top: 1px solid rgba(0, 120, 255, 0.2);
            padding: 30px 20px;
            text-align: center;
        }

        .footer p {
            color: #808080;
            font-size: 0.85rem;
            margin: 0;
            font-weight: 400;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 30px 15px;
            }

            .logo {
                width: 100px;
                height: 100px;
            }

            .welcome-section h1 {
                font-size: 1.5rem;
            }

            .consultor-card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .consultor-text {
                text-align: center;
            }

            .consultor-image {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>

                <stop offset="100%" style="stop-color:#0078ff;stop-opacity:1" />

    <div class="main-content">

                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>

                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    </svg>
                </a>
                <a href="https://www.brandcodesolutions.com.br" class="social-link" title="Website">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                </a>
            </div>

            <!-- Consultores List -->
            <div class="consultores-list">
                <!-- Consultor 1 -->
                <a href="fernandaarcanjo.html" class="consultor-link">
                    <img src="images/fernandabox.png" alt="Consultor 1 - Fernanda" class="consultor-box-image">
                </a>

                <!-- Consultor 2 -->
                <a href="janainapaiva.html" class="consultor-link">
                    <img src="images/janainabox.png" alt="Consultor 2 - Janaína" class="consultor-box-image">
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Todos os direitos reservados - BrandCode Solutions</p>
    </footer>
